spring:
  application:
    name: service-communications
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/communications}
    username: ${DB_USERNAME:communications}
    password: ${DB_PASSWORD:communications}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

server:
  port: ${SERVER_PORT:5628}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}

security:
  jwt:
    # Dev default matches cc-identity-service's own dev default, so local tokens validate
    # without extra setup. In any real deployment both services must read the same JWT_SECRET.
    secret: ${JWT_SECRET:super-secret-key-that-is-at-least-256-bits-long-for-hs256}
    issuer: ${JWT_ISSUER:}
    audience: ${JWT_AUDIENCE:}
    clock-skew-seconds: ${JWT_CLOCK_SKEW_SECONDS:30}
  # Paths that skip authentication entirely (see SecurityProperties). Left unset here so the
  # built-in defaults apply; override with a comma-separated SECURITY_PUBLIC_PATHS env var if a
  # future integration (e.g. the API gateway) needs another path opened without a code change.

websocket:
  allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:*}

integrations:
  user-service:
    # cc-users-players-service's actual default: server.port 5621 + its own
    # server.servlet.context-path (/api/v1). That service, not cc-identity-service, is the
    # source of truth for userId and owns the internal existence-check endpoint below.
    base-url: ${USER_SERVICE_URL:http://localhost:5621/api/v1}
    # cc-users-players-service exposes GET /internal/players/{id}/exists (InternalPlayerController,
    # built specifically for service-to-service existence checks) — safe to keep enabled.
    existence-check-enabled: ${USER_EXISTENCE_CHECK:true}
  team-service:
    # cc-teams-service's actual default (server.port in its own application.yml).
    base-url: ${TEAM_SERVICE_URL:http://localhost:5622}
    # cc-teams-service now exposes GET /teams/{id} (TeamInfoController, unauthenticated,
    # service-to-service) — safe to keep enabled.
    existence-check-enabled: ${TEAM_EXISTENCE_CHECK:true}
  notification-service:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
    # am-notification-service guards its service-to-service webhooks (including the one below)
    # behind a shared "X-Internal-Api-Key" header, checked against this same env var on its side.
    # No default: an unset key just means every notification call gets a 401, best-effort logged
    # like any other notification failure — this integration doesn't fail the app at startup.
    api-key: ${INTERNAL_API_KEY:}
  groq:
    base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
    # No default on purpose: the app must fail to start rather than run without a real key.
    api-key: ${GROQ_API_KEY}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}
    # Blank falls back to GroqProperties' built-in default prompt.
    system-prompt: ${GROQ_SYSTEM_PROMPT:}

feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000
      # Chat completions take longer than a plain CRUD call to identity/teams/notifications/audit.
      groq-chatbot:
        read-timeout: 30000

logging:
  level:
    co.edu.escuelaing.techcup.communications: INFO
